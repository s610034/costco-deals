<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>好市多折扣週報</title>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body {
    font-family: -apple-system, BlinkMacSystemFont, "PingFang TC", "Noto Sans TC", sans-serif;
    background: #f5f5f5;
    min-height: 100vh;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    padding: 24px 16px;
  }
  .card {
    background: white;
    border-radius: 16px;
    padding: 32px 24px;
    max-width: 480px;
    width: 100%;
    text-align: center;
    box-shadow: 0 4px 24px rgba(0,0,0,0.08);
  }
  .logo { font-size: 3rem; margin-bottom: 12px; }
  h1 { color: #E3001B; font-size: 1.4rem; margin-bottom: 8px; }
  .sub { color: #666; font-size: 0.9rem; margin-bottom: 28px; line-height: 1.6; }
  .btn {
    display: block;
    background: #E3001B;
    color: white;
    text-decoration: none;
    padding: 14px 24px;
    border-radius: 12px;
    font-weight: 700;
    font-size: 1rem;
    margin-bottom: 12px;
    transition: background .2s;
  }
  .btn:hover { background: #c0001a; }
  .btn.secondary {
    background: #005DAA;
  }
  .btn.secondary:hover { background: #004a8a; }
  .note { color: #999; font-size: 0.75rem; margin-top: 20px; }
</style>
</head>
<body>
<div class="card">
  <div class="logo">🛒</div>
  <h1>好市多折扣週報</h1>
  <p class="sub">每週一自動更新，整理好市多本週所有折扣商品<br>由 Hermes Agent 自動爬取整理</p>
  <a class="btn" id="latest-link" href="#">📋 查看本週折扣</a>
  <a class="btn secondary" href="https://www.costco.com.tw/c/hot-buys" target="_blank">🔗 前往好市多官網</a>
  <p class="note">每週一 08:00 自動更新 ｜ 資料來源：costco.com.tw</p>
</div>
<script>
  // 自動跳轉到最新一週的報告
  const links = document.querySelectorAll('link[rel="report"]');
  // 用日期推算最新報告檔名
  const today = new Date();
  const pad = n => String(n).padStart(2, '0');
  const filename = `${today.getFullYear()}${pad(today.getMonth()+1)}${pad(today.getDate())}`;
  const latestLink = document.getElementById('latest-link');
  latestLink.href = `costco_${filename}.html`;
</script>
</body>
</html>
